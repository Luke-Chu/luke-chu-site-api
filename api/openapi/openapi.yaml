openapi: 3.0.3
info:
  title: Luke Chu Site API
  version: 0.1.0
  description: 个人网站后端 API 草稿，当前以摄影图库模块为主。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
paths:
  /api/v1/health:
    get:
      summary: 健康检查
      tags: [基础]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/photos:
    get:
      summary: 图片列表
      tags: [图片]
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/TagMode'
        - $ref: '#/components/parameters/Orientation'
        - $ref: '#/components/parameters/Year'
        - $ref: '#/components/parameters/Month'
        - $ref: '#/components/parameters/Category'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoListResponse'
  /api/v1/filters:
    get:
      summary: 获取筛选项
      tags: [图片]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterResponse'
  /api/v1/photos/{uuid}:
    get:
      summary: 图片详情
      tags: [图片]
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoDetailResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资源不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/photos/{uuid}/view:
    post:
      summary: 记录浏览行为
      tags: [图片行为]
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoViewResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 触发行为风控策略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/photos/{uuid}/like:
    post:
      summary: 点赞
      tags: [图片行为]
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoLikeResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 触发行为风控策略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/photos/{uuid}/download:
    post:
      summary: 记录下载行为并返回临时签名URL
      tags: [图片行为]
      parameters:
        - $ref: '#/components/parameters/Uuid'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoDownloadResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 触发行为风控策略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    Q:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: 统一搜索词，支持空格、英文逗号、中文逗号、顿号分词
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 页码
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 30
      description: 每页数量
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [shot_time, like_count, view_count, download_count, created_at]
        default: shot_time
      description: 排序字段
    Order:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: 排序方向
    Tags:
      name: tags
      in: query
      required: false
      schema:
        type: string
      description: 标签字符串，支持逗号分隔
    TagMode:
      name: tagMode
      in: query
      required: false
      schema:
        type: string
        enum: [any, all]
        default: any
      description: 标签匹配模式
    Orientation:
      name: orientation
      in: query
      required: false
      schema:
        type: string
        enum: [landscape, portrait, square]
      description: 图片方向
    Year:
      name: year
      in: query
      required: false
      schema:
        type: integer
      description: 拍摄年份
    Month:
      name: month
      in: query
      required: false
      schema:
        type: integer
      description: 拍摄月份
    Category:
      name: category
      in: query
      required: false
      schema:
        type: string
      description: 分类
    Uuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 图片 UUID
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 40002
        message:
          type: string
          example: invalid uuid
        data:
          nullable: true
          example: null
      required: [code, message, data]
    HealthData:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: luke-chu-site-api
      required: [status, service]
    HealthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/HealthData'
      required: [code, message, data]
    PhotoTagItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tagType:
          type: string
      required: [id, name, tagType]
    PhotoListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        filename:
          type: string
        titleCn:
          type: string
        titleEn:
          type: string
        thumbUrl:
          type: string
        displayUrl:
          type: string
        width:
          type: integer
        height:
          type: integer
        orientation:
          type: string
        shotTime:
          type: string
          format: date-time
        aperture:
          type: string
        shutterSpeed:
          type: string
        iso:
          type: integer
        likeCount:
          type: integer
          format: int64
        viewCount:
          type: integer
          format: int64
        downloadCount:
          type: integer
          format: int64
        tags:
          type: array
          items:
            $ref: '#/components/schemas/PhotoTagItem'
      required: [id, uuid, filename, width, height, likeCount, viewCount, downloadCount, tags]
    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
          format: int64
        totalPages:
          type: integer
      required: [page, pageSize, total, totalPages]
    PhotoListQuery:
      type: object
      properties:
        q:
          type: string
        keywords:
          type: array
          items:
            type: string
        sort:
          type: string
        order:
          type: string
        tags:
          type: array
          items:
            type: string
        tagMode:
          type: string
        orientation:
          type: string
        year:
          type: integer
        month:
          type: integer
        category:
          type: string
    PhotoListData:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/PhotoListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
        query:
          $ref: '#/components/schemas/PhotoListQuery'
      required: [list, pagination, query]
    PhotoListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PhotoListData'
      required: [code, message, data]
    OrientationOption:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
          format: int64
      required: [name, count]
    FilterData:
      type: object
      properties:
        years:
          type: array
          items:
            type: integer
        categories:
          type: array
          items:
            type: string
        orientations:
          type: array
          items:
            $ref: '#/components/schemas/OrientationOption'
        tagTypes:
          type: array
          items:
            type: string
        tags:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/PhotoTagItem'
      required: [years, categories, orientations, tagTypes, tags]
    FilterResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/FilterData'
      required: [code, message, data]
    PhotoDetailData:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        filename:
          type: string
        titleCn:
          type: string
        titleEn:
          type: string
        description:
          type: string
        category:
          type: string
        shotTime:
          type: string
          format: date-time
        width:
          type: integer
        height:
          type: integer
        resolution:
          type: string
        orientation:
          type: string
        cameraModel:
          type: string
        lensModel:
          type: string
        focalLength:
          type: number
          format: double
        focalLength35mm:
          type: number
          format: double
        aperture:
          type: string
        shutterSpeed:
          type: string
        iso:
          type: integer
        meteringMode:
          type: string
        exposureCompensation:
          type: string
          description: 对应数据库字段 exposure_compensation
        exposureProgram:
          type: string
        whiteBalance:
          type: string
        flash:
          type: string
        thumbUrl:
          type: string
        displayUrl:
          type: string
        originalUrl:
          type: string
        likeCount:
          type: integer
          format: int64
        viewCount:
          type: integer
          format: int64
        downloadCount:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            $ref: '#/components/schemas/PhotoTagItem'
      required: [id, uuid, filename, likeCount, viewCount, downloadCount, tags]
    PhotoDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PhotoDetailData'
      required: [code, message, data]
    PhotoViewData:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        viewCount:
          type: integer
          format: int64
        counted:
          type: boolean
      required: [uuid, viewCount, counted]
    PhotoViewResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PhotoViewData'
      required: [code, message, data]
    PhotoLikeData:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        liked:
          type: boolean
        likeCount:
          type: integer
          format: int64
      required: [uuid, liked, likeCount]
    PhotoLikeResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PhotoLikeData'
      required: [code, message, data]
    PhotoDownloadData:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        downloadCount:
          type: integer
          format: int64
        downloadUrl:
          type: string
          description: OSS 预签名临时下载 URL
        counted:
          type: boolean
          description: 是否在防刷窗口外并成功累计计数
      required: [uuid, downloadCount, downloadUrl, counted]
    PhotoDownloadResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PhotoDownloadData'
      required: [code, message, data]
