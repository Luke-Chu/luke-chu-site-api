services:
  api:
    image: ghcr.io/luke-chu/luke-chu-site-api:${IMAGE_TAG:-latest}
    container_name: luke-chu-site-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
