name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          APP_NAME="luke-chu-site-api"
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist

          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          BIN_NAME="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}${EXT}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -o "dist/${BIN_NAME}" ./cmd/server

      - name: Package artifact
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          APP_NAME="luke-chu-site-api"
          VERSION="${GITHUB_REF_NAME:-dev}"

          if [[ "${GOOS}" == "windows" ]]; then
            zip -j "dist/${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}.zip" "dist/${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}.exe"
          else
            tar -czf "dist/${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}.tar.gz" -C dist "${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
