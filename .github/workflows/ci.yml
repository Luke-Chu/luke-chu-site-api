name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          unformatted_files=$(gofmt -l $(git ls-files '*.go'))
          if [[ -n "${unformatted_files}" ]]; then
            echo "以下 Go 文件未格式化："
            echo "${unformatted_files}"
            exit 1
          fi

      - name: Verify go.mod / go.sum tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1

      - name: Build server
        run: |
          mkdir -p bin
          go build -trimpath -o bin/luke-chu-site-api ./cmd/server
